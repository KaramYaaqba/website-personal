<div class="medium-feed">
  <h2>Latest Medium Posts</h2>
  
  <ul *ngIf="posts.length > 0; else loading">
    <li *ngFor="let post of posts">
      <a [href]="post.link" target="_blank">
        <h3>{{ post.title }}</h3>
      </a>
      <p>{{ post.description }}</p>
      <small>Published on: {{ post.pubDate | date }}</small>
    </li>
  </ul>

  <!-- Loading and error handling -->
  <ng-template #loading>
    <p>Loading Medium posts...</p>
  </ng-template>
</div>
